services:
  vault-client-count-exporter:
    depends_on:
      vault:
        condition: service_healthy
      vault-config:
        condition: service_completed_successfully
    # command: ["-monthly"]
    environment:
      - VAULT_TOKEN=root
      - VAULT_ADDR=http://vault:8200
      - VAULT_MONTHLY_ACTIVITY_FILE=/assets/sample.json
    build:
      context: ./..
      dockerfile: Dockerfile
      args:
        VERSION: v0.0.1
    healthcheck:
      test: [ "CMD", "wget", "-q", "http://127.0.0.1:9090/healthz","-O","/dev/null" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    ports:
      - "8090:9090/tcp"
    volumes:
      - ./../assets/sample.json:/assets/sample.json:ro
    networks:
      vault-client-count-exporter:
        aliases:
          - vault-client-count-exporter
  prometheus:
    image: prom/prometheus
    depends_on:
      - vault-client-count-exporter
    networks:
      vault-client-count-exporter:
        aliases:
          - prometheus
    ports:
      - "9090:9090/tcp"
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.listen-address=:9090
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - prometheus-data:/prometheus
  grafana:
    image: grafana/grafana
    networks:
      vault-client-count-exporter:
        aliases:
          - grafana
    ports:
      - "3000:3000/tcp"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml
      - ./grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./../assets/dashboard.json:/var/lib/grafana/dashboards/vault-client-count-exporter.json
  vault:
    image: hashicorp/vault:1.21.4
    networks:
      vault-client-count-exporter:
        aliases:
          - vault
    ports:
      - "8200:8200/tcp"
    environment:
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_ADDR=http://127.0.0.1:8200
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  vault-config:
    image: hashicorp/vault:1.21.4
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
    command:
      - sh
      - -ec
      - |
        vault write sys/internal/counters/config \
          enabled=enable \
          retention_months=12
    networks:
      vault-client-count-exporter:

networks:
  vault-client-count-exporter:
    driver: bridge

volumes:
  prometheus-data:
